<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon-source.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#b3552a" />
    <meta name="description" content="A private, secure, free, offline-first note-taking app." />
    <title>Notebuddy</title>
    <script>
      ;(function () {
        try {
          var stored = window.localStorage.getItem('notebuddy:theme-mode')
          var resolved =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.dataset.theme = resolved
        } catch {
          /* localStorage/matchMedia unavailable — fall back to default (light) styling */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
